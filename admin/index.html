<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Admin — DMR Construction</title>
<meta name="robots" content="noindex,nofollow" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../styles.css">
<style>
  /* ---------- admin shell ---------- */
  body { background: var(--paper); }

  .admin-shell { min-height: 100vh; padding-bottom: 80px; }

  .admin-nav {
    position: sticky; top: 0; z-index: 40;
    background: rgba(11,22,32,0.96);
    backdrop-filter: saturate(140%) blur(14px);
    color: var(--white);
    padding: 14px 28px;
    display: flex; align-items: center; justify-content: space-between;
    gap: 16px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }
  .admin-nav .brand {
    display: flex; align-items: center; gap: 12px;
  }
  .admin-nav .brand-mark {
    width: 36px; height: 36px;
    background: var(--accent);
    color: var(--white);
    display: grid; place-items: center;
    font-family: var(--font-display);
    font-size: 18px; font-weight: 500;
    border-radius: 2px;
  }
  .admin-nav .title {
    font-family: var(--font-display);
    font-size: 17px; font-weight: 500;
    color: var(--white);
  }
  .admin-nav .title em { font-style: italic; color: var(--accent-2); font-weight: 400; }
  .admin-nav .meta {
    font-family: var(--font-mono);
    font-size: 10.5px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.55);
    margin-left: 18px;
  }
  .admin-nav .right {
    display: flex; gap: 10px; align-items: center;
  }
  .admin-nav button, .admin-nav a.btnish {
    font-family: var(--font-mono);
    font-size: 10.5px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    padding: 9px 14px;
    border-radius: 999px;
    color: var(--white);
    background: transparent;
    border: 1px solid rgba(255,255,255,0.2);
    cursor: pointer;
    transition: background 200ms ease, border-color 200ms ease;
    text-decoration: none;
  }
  .admin-nav button:hover, .admin-nav a.btnish:hover {
    background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.4);
  }
  .admin-nav button.danger { color: #ff8d6f; border-color: rgba(255,141,111,0.3); }
  .admin-nav button.danger:hover { background: rgba(255,141,111,0.08); }
  .admin-nav button.primary {
    background: var(--accent); border-color: var(--accent); color: var(--white);
  }
  .admin-nav button.primary:hover { background: #9a3a23; border-color: #9a3a23; }

  /* ---------- category filter bar ---------- */
  .filter-bar {
    background: var(--paper);
    border-bottom: 1px solid var(--line-soft);
    padding: 14px 28px;
    display: flex; flex-wrap: wrap; gap: 6px;
    align-items: center;
    overflow-x: auto;
  }
  .filter-bar button {
    flex-shrink: 0;
    font-family: var(--font-mono);
    font-size: 10.5px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    padding: 8px 14px;
    border-radius: 999px;
    background: transparent;
    border: 1px solid var(--line);
    color: var(--ink-3);
    cursor: pointer;
    transition: background 200ms ease, color 200ms ease, border-color 200ms ease;
  }
  .filter-bar button:hover { background: var(--paper-2); color: var(--ink); }
  .filter-bar button.active {
    background: var(--ink); color: var(--white); border-color: var(--ink);
  }

  /* ---------- search ---------- */
  .search-row {
    background: var(--paper);
    padding: 18px 28px 0;
    display: flex; gap: 12px; align-items: center;
  }
  .search-row input {
    flex: 1;
    padding: 12px 16px;
    font-family: inherit;
    font-size: 14px;
    background: var(--white);
    border: 1px solid var(--line-soft);
    border-radius: 999px;
    color: var(--ink);
    outline: none;
    transition: border-color 200ms ease;
  }
  .search-row input:focus { border-color: var(--ink); }

  /* ---------- product grid ---------- */
  .prod-grid {
    padding: 28px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 20px;
  }
  .prod-card {
    background: var(--white);
    border: 1px solid var(--line-soft);
    border-radius: var(--radius);
    overflow: hidden;
    display: flex; flex-direction: column;
    transition: border-color 200ms ease, box-shadow 200ms ease;
  }
  .prod-card.overridden { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(184,71,43,0.12); }

  .prod-img-wrap {
    position: relative;
    aspect-ratio: 4 / 3;
    background: var(--paper-2);
    overflow: hidden;
  }
  .prod-img-wrap img {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
  }
  .prod-img-wrap .empty {
    position: absolute; inset: 0;
    display: grid; place-items: center;
    color: var(--muted);
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    text-align: center;
    padding: 16px;
  }
  .prod-img-wrap .status {
    position: absolute;
    top: 10px; left: 10px;
    background: var(--accent);
    color: var(--white);
    font-family: var(--font-mono);
    font-size: 9px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    padding: 4px 8px;
    border-radius: 2px;
  }

  .prod-body {
    padding: 16px 18px 18px;
    display: flex; flex-direction: column; gap: 8px;
    flex: 1;
  }
  .prod-meta {
    display: flex; align-items: baseline; justify-content: space-between; gap: 10px;
  }
  .prod-meta .cat {
    font-family: var(--font-mono);
    font-size: 9.5px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .prod-meta .code {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.16em;
    color: var(--ink-3);
  }
  .prod-name {
    font-family: var(--font-display);
    font-size: 16px;
    line-height: 1.2;
    letter-spacing: -0.012em;
    color: var(--ink);
  }
  .prod-filename {
    font-family: var(--font-mono);
    font-size: 10.5px;
    color: var(--muted);
    word-break: break-all;
  }

  .prod-actions {
    margin-top: 10px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
  }
  .prod-actions label, .prod-actions button, .prod-actions a {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    font-family: var(--font-mono);
    font-size: 9.5px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    padding: 9px 10px;
    border-radius: 4px;
    cursor: pointer;
    transition: background 200ms ease, color 200ms ease;
    text-decoration: none;
    border: 1px solid var(--line);
    color: var(--ink);
    background: transparent;
    text-align: center;
    user-select: none;
  }
  .prod-actions label:hover, .prod-actions button:hover, .prod-actions a:hover {
    background: var(--ink); color: var(--white); border-color: var(--ink);
  }
  .prod-actions input[type=file] { display: none; }
  .prod-actions .full { grid-column: 1 / -1; }
  .prod-actions .danger { color: #B8472B; border-color: rgba(184,71,43,0.3); }
  .prod-actions .danger:hover { background: #B8472B; color: var(--white); border-color: #B8472B; }
  .prod-actions .primary { background: var(--accent); color: var(--white); border-color: var(--accent); }
  .prod-actions .primary:hover { background: #9a3a23; border-color: #9a3a23; }
  .prod-actions .disabled { opacity: 0.4; pointer-events: none; }

  /* ---------- inline edit form ---------- */
  .prod-edit {
    display: none;
    margin-top: 14px;
    padding-top: 14px;
    border-top: 1px dashed var(--line);
    flex-direction: column;
    gap: 10px;
  }
  .prod-edit.open { display: flex; }
  .prod-edit label {
    display: block;
    font-family: var(--font-mono);
    font-size: 9.5px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 5px;
  }
  .prod-edit input, .prod-edit textarea {
    width: 100%;
    padding: 8px 10px;
    font-family: inherit;
    font-size: 13px;
    line-height: 1.4;
    background: var(--paper);
    border: 1px solid var(--line-soft);
    border-radius: 3px;
    color: var(--ink);
    outline: none;
    transition: border-color 200ms ease;
    resize: vertical;
  }
  .prod-edit input:focus, .prod-edit textarea:focus { border-color: var(--ink); }
  .prod-edit textarea { min-height: 60px; }
  .prod-edit .spec-row {
    display: grid;
    grid-template-columns: 1fr 1.4fr;
    gap: 6px;
  }
  .prod-edit .form-actions {
    margin-top: 4px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
  }
  .prod-edit .form-actions button {
    padding: 9px 10px;
    border-radius: 4px;
    font-family: var(--font-mono);
    font-size: 9.5px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    cursor: pointer;
    border: 1px solid var(--line);
    background: transparent;
    color: var(--ink);
    transition: background 200ms ease, color 200ms ease;
  }
  .prod-edit .form-actions button.save {
    background: var(--ink); color: var(--white); border-color: var(--ink);
  }
  .prod-edit .form-actions button.save:hover { background: var(--accent); border-color: var(--accent); }
  .prod-edit .form-actions button.reset {
    color: #B8472B; border-color: rgba(184,71,43,0.3);
  }
  .prod-edit .form-actions button.reset:hover { background: #B8472B; color: var(--white); border-color: #B8472B; }
  .prod-edit .form-actions .cancel:hover { background: var(--paper-2); }

  /* ---------- password gate ---------- */
  .gate {
    position: fixed; inset: 0;
    background: linear-gradient(160deg, #0E1F2C, #0B1620);
    color: var(--white);
    display: grid; place-items: center;
    z-index: 100;
  }
  .gate::before {
    content: "";
    position: absolute; inset: 0;
    background:
      radial-gradient(900px 380px at 110% -10%, rgba(184,71,43,0.22), transparent 60%),
      radial-gradient(700px 320px at -10% 110%, rgba(198,138,61,0.16), transparent 65%);
    pointer-events: none;
  }
  .gate-inner {
    width: min(420px, 90vw);
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.1);
    padding: 40px 36px;
    border-radius: 4px;
    text-align: left;
    position: relative;
    z-index: 1;
  }
  .gate-kicker {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent-2);
    display: inline-flex; align-items: center; gap: 12px;
    margin-bottom: 18px;
  }
  .gate-kicker::before {
    content: "";
    width: 28px; height: 1px;
    background: var(--accent);
    display: inline-block;
  }
  .gate-inner h1 {
    font-family: var(--font-display);
    font-size: 34px; font-weight: 400;
    line-height: 1.05; letter-spacing: -0.022em;
    color: var(--white);
  }
  .gate-inner h1 em { font-style: italic; color: var(--accent-2); }
  .gate-inner p {
    margin-top: 12px;
    font-size: 14px;
    color: rgba(255,255,255,0.6);
    line-height: 1.55;
  }
  .gate-form {
    margin-top: 26px;
    display: grid;
    gap: 10px;
  }
  .gate-form input {
    padding: 14px 16px;
    font-family: inherit;
    font-size: 15px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 4px;
    color: var(--white);
    outline: none;
    transition: border-color 200ms ease;
  }
  .gate-form input:focus { border-color: var(--accent); }
  .gate-form button {
    padding: 14px 18px;
    background: var(--accent);
    color: var(--white);
    border: 0;
    border-radius: 4px;
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 200ms ease;
  }
  .gate-form button:hover { background: #9a3a23; }
  .gate-error {
    margin-top: 10px;
    color: #ff8d6f;
    font-size: 13px;
    min-height: 18px;
  }

  /* ---------- toast ---------- */
  .toast {
    position: fixed;
    bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(120%);
    background: var(--ink);
    color: var(--white);
    padding: 12px 22px;
    border-radius: 999px;
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    transition: transform 300ms ease;
    z-index: 90;
    box-shadow: 0 20px 40px -16px rgba(0,0,0,0.4);
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  @media (max-width: 700px) {
    .admin-nav { flex-wrap: wrap; padding: 12px 18px; }
    .admin-nav .meta { display: none; }
    .filter-bar, .search-row, .prod-grid { padding-left: 18px; padding-right: 18px; }
    .prod-grid { grid-template-columns: 1fr 1fr; gap: 14px; }
  }
  @media (max-width: 480px) {
    .prod-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<!-- PASSWORD GATE -->
<div class="gate" id="gate">
  <div class="gate-inner">
    <div class="gate-kicker">DMR · Admin</div>
    <h1>Product image<br><em>manager.</em></h1>
    <p>
      Restricted area. Enter the admin password to upload and manage
      product images for the DMR Construction catalogue.
    </p>
    <form class="gate-form" id="gate-form">
      <input type="password" id="gate-pw" placeholder="Password" autocomplete="current-password" autofocus />
      <button type="submit">Unlock</button>
    </form>
    <div class="gate-error" id="gate-error"></div>
  </div>
</div>

<!-- ADMIN -->
<div class="admin-shell" id="admin" style="display:none">
  <header class="admin-nav">
    <div class="brand">
      <div class="brand-mark">D</div>
      <div>
        <div class="title">DMR <em>Construction</em> · Admin</div>
      </div>
      <span class="meta" id="meta-count">0 overrides</span>
    </div>
    <div class="right">
      <a href="../catalogue.html" target="_blank" class="btnish">View catalogue ↗</a>
      <button class="danger" id="btn-clear" type="button">Clear all</button>
      <button class="primary" id="btn-export-all" type="button">Download all changes</button>
      <button id="btn-logout" type="button">Logout</button>
    </div>
  </header>

  <div class="search-row">
    <input type="search" id="search" placeholder="Search by name, code or filename…" />
  </div>

  <div class="filter-bar" id="filter-bar"></div>

  <div class="prod-grid" id="grid"></div>
</div>

<div class="toast" id="toast">Saved</div>

   - Password "deneme123" gates the UI (session-scoped).

   - The catalogue page (script.js) reads localStorage on
     load and overrides matching <img class="product-img">
     elements — instant preview without a backend.
   - Each card offers a per-file Download to save the new
     image with the correct filename for commit.
   ========================================================= */

  { cat:'Ytong',     code:'BR-HL',  name:'Hollow Clay Brick',             file:'brick-hollow.jpg' },
  { cat:'Ytong',     code:'BR-CB',  name:'Concrete Block',                file:'brick-concrete.jpg' },
  // 08 — Timber & plywood
  { cat:'Timber',    code:'TM-CN',  name:'Construction Timber',           file:'timber-construction.jpg' },
  { cat:'Timber',    code:'PW-SH',  name:'Concrete Shuttering Plywood',   file:'plywood-shuttering.jpg' },
  { cat:'Timber',    code:'PW-ST',  name:'Structural Plywood',            file:'plywood-structural.jpg' },
  { cat:'Timber',    code:'PW-OS',  name:'OSB Panel',                     file:'plywood-osb.jpg' },
  { cat:'Timber',    code:'TM-FW',  name:'H20 Formwork Beam',             file:'timber-formwork.jpg' },
  { cat:'Timber',    code:'PW-MD',  name:'MDF Panel',                     file:'plywood-mdf.jpg' },
];

const CATEGORIES = [
  'All','Drywall','Plasters','Profiles','Sheets','Ceramics','Paints','Ytong','Timber'
];

let activeCategory = 'All';
let searchTerm = '';

/* ---------------- gate ---------------- */
const gate = document.getElementById('gate');
const admin = document.getElementById('admin');
const gateForm = document.getElementById('gate-form');
const gatePw = document.getElementById('gate-pw');
const gateError = document.getElementById('gate-error');

function showAdmin() {
  gate.style.display = 'none';
  admin.style.display = '';
  renderFilters();
  renderGrid();
  updateMeta();
  loadCatalogueDefaults();
}

/* fetch catalogue.html once so edit forms can show current defaults */
let catalogueDoc = null;
let catalogueLoading = false;
async function loadCatalogueDefaults() {
  if (catalogueDoc || catalogueLoading) return;
  catalogueLoading = true;
  try {
    const r = await fetch('../catalogue.html');
    const html = await r.text();
    catalogueDoc = new DOMParser().parseFromString(html, 'text/html');
  } catch (_) {
    /* local file:// will fail — edit forms still work, just without
       pre-filled defaults */
  } finally {
    catalogueLoading = false;
  }
}
function getDefaultsForProduct(code) {
  if (!catalogueDoc) return null;
  const card = catalogueDoc.querySelector('.product-card[data-code="' + code + '"]');
  if (!card) return null;
  const specRows = Array.from(card.querySelectorAll('.product-specs .row')).map((row) => {
    const kEl = row.querySelector('.k');
    const vEl = Array.from(row.children).find((c) => !c.classList.contains('k'));
    return {
      k: kEl ? kEl.textContent.trim() : '',
      v: vEl ? vEl.textContent.trim() : '',
    };
  });
  return {
    name: (card.querySelector('.name') || {}).textContent?.trim() || '',
    desc: (card.querySelector('.desc') || {}).textContent?.trim() || '',
    specs: specRows,
  };
}
function showGate() {
  gate.style.display = '';
  admin.style.display = 'none';
  gatePw.value = '';
  gatePw.focus();
}
if (sessionStorage.getItem(AUTH_KEY) === '1') {
  showAdmin();
} else {
  gatePw.focus();
}

gateForm.addEventListener('submit', (e) => {
  e.preventDefault();
  if (gatePw.value === ADMIN_PASSWORD) {
    sessionStorage.setItem(AUTH_KEY, '1');
    gateError.textContent = '';
    showAdmin();
  } else {
    gateError.textContent = 'Wrong password. Try again.';
    gatePw.select();
  }
});

document.getElementById('btn-logout').addEventListener('click', () => {
  sessionStorage.removeItem(AUTH_KEY);
  showGate();
});

/* ---------------- filters + search ---------------- */
function renderFilters() {
  const bar = document.getElementById('filter-bar');
  bar.innerHTML = '';
  CATEGORIES.forEach((c) => {
    const b = document.createElement('button');
    b.textContent = c;
    if (c === activeCategory) b.classList.add('active');
    b.addEventListener('click', () => {
      activeCategory = c;
      renderFilters();
      renderGrid();
    });
    bar.appendChild(b);
  });
}

document.getElementById('search').addEventListener('input', (e) => {
  searchTerm = e.target.value.toLowerCase().trim();
  renderGrid();
});

/* ---------------- grid ---------------- */
function getOverride(file) {
  return localStorage.getItem(STORAGE_PREFIX + file);
}
function setOverride(file, dataUrl) {
  localStorage.setItem(STORAGE_PREFIX + file, dataUrl);
}
function clearOverride(file) {
  localStorage.removeItem(STORAGE_PREFIX + file);
}
function getProdEdit(code) {
  try {
    const raw = localStorage.getItem(PROD_PREFIX + code);
    return raw ? JSON.parse(raw) : null;
  } catch (_) { return null; }
}
function setProdEdit(code, data) {
  localStorage.setItem(PROD_PREFIX + code, JSON.stringify(data));
}
function clearProdEdit(code) {
  localStorage.removeItem(PROD_PREFIX + code);
}
function countOverrides() {
  let n = 0;
  for (let i = 0; i < localStorage.length; i++) {
    const k = localStorage.key(i);
    if (k && (k.indexOf(STORAGE_PREFIX) === 0 || k.indexOf(PROD_PREFIX) === 0)) n++;
  }
  return n;
}
function updateMeta() {
  const n = countOverrides();
  document.getElementById('meta-count').textContent = n + ' override' + (n === 1 ? '' : 's');
}

function renderGrid() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  const list = PRODUCTS.filter((p) => {
    if (activeCategory !== 'All' && p.cat !== activeCategory) return false;
    if (searchTerm) {
      const hay = (p.name + ' ' + p.code + ' ' + p.file).toLowerCase();
      if (hay.indexOf(searchTerm) === -1) return false;
    }
    return true;
  });
  list.forEach((p) => grid.appendChild(buildCard(p)));
  if (list.length === 0) {
    const empty = document.createElement('div');
    empty.style.cssText = 'grid-column:1/-1;padding:60px 20px;text-align:center;color:var(--muted);font-family:var(--font-mono);font-size:11px;letter-spacing:0.16em;text-transform:uppercase;';
    empty.textContent = 'No products match';
    grid.appendChild(empty);
  }
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, (c) => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[c]));
}

function buildCard(p) {
  const card = document.createElement('div');
  card.className = 'prod-card';
  const override = getOverride(p.file);
  const edit = getProdEdit(p.code);
  if (override || edit) card.classList.add('overridden');

  // image
  const imgWrap = document.createElement('div');
  imgWrap.className = 'prod-img-wrap';
  if (override || edit) {
    const st = document.createElement('div');
    st.className = 'status';
    st.textContent = override && edit ? 'Edited · img' : (edit ? 'Edited' : 'New img');
    imgWrap.appendChild(st);
  }
  const img = document.createElement('img');
  img.alt = p.name;
  img.src = override || ('../images/' + p.file);
  img.addEventListener('error', () => {
    img.style.display = 'none';
    const empty = document.createElement('div');
    empty.className = 'empty';
    empty.textContent = 'No image yet · upload one';
    imgWrap.appendChild(empty);
  });
  imgWrap.appendChild(img);
  card.appendChild(imgWrap);

  // body
  const body = document.createElement('div');
  body.className = 'prod-body';
  const displayName = (edit && edit.name) ? edit.name : p.name;
  body.innerHTML = `
    <div class="prod-meta">
      <span class="cat">${escapeHtml(p.cat)}</span>
      <span class="code">${escapeHtml(p.code)}</span>
    </div>
    <div class="prod-name">${escapeHtml(displayName)}</div>
    <div class="prod-filename">${escapeHtml(p.file)}</div>
  `;

  const actions = document.createElement('div');
  actions.className = 'prod-actions';

  // upload
  const uploadLabel = document.createElement('label');
  uploadLabel.className = 'full primary';
  uploadLabel.textContent = override ? 'Replace image' : 'Upload image';
  const fileIn = document.createElement('input');
  fileIn.type = 'file';
  fileIn.accept = 'image/*';
  fileIn.addEventListener('change', (e) => handleUpload(e, p));
  uploadLabel.appendChild(fileIn);
  actions.appendChild(uploadLabel);

  // edit details button (only meaningful for products with a code other than 'HERO')
  const editBtn = document.createElement('button');
  editBtn.className = p.code === 'HERO' ? 'full disabled' : 'full';
  editBtn.type = 'button';
  editBtn.textContent = edit ? '✎ Edit details (saved)' : '✎ Edit details';
  if (p.code !== 'HERO') {
    editBtn.addEventListener('click', () => toggleEdit(card, p));
  }
  actions.appendChild(editBtn);

  if (override) {
    const dl = document.createElement('a');
    dl.textContent = '↓ Download img';
    dl.href = override;
    dl.download = p.file;
    actions.appendChild(dl);

    const rm = document.createElement('button');
    rm.className = 'danger';
    rm.textContent = '× Reset img';
    rm.addEventListener('click', () => {
      clearOverride(p.file);
      renderGrid(); updateMeta();
      toast('Reset · ' + p.file);
    });
    actions.appendChild(rm);
  }

  body.appendChild(actions);

  // inline edit form (hidden until expanded)
  const editForm = document.createElement('div');
  editForm.className = 'prod-edit';
  editForm.dataset.code = p.code;
  body.appendChild(editForm);

  card.appendChild(body);
  return card;
}

function toggleEdit(card, p) {
  const form = card.querySelector('.prod-edit');
  if (form.classList.contains('open')) {
    form.classList.remove('open');
    form.innerHTML = '';
    return;
  }
  buildEditForm(form, p);
  form.classList.add('open');
}

function buildEditForm(container, p) {
  const defaults = getDefaultsForProduct(p.code) || { name: p.name, desc: '', specs: [{},{},{},{}] };
  const saved = getProdEdit(p.code) || {};
  const current = {
    name: saved.name || defaults.name || p.name,
    desc: saved.desc || defaults.desc || '',
    specs: (saved.specs && saved.specs.length) ? saved.specs : (defaults.specs || []),
  };
  // pad specs to 4 rows if needed
  while (current.specs.length < 4) current.specs.push({ k: '', v: '' });

  const html = [];
  html.push(`
    <div>
      <label>Product name</label>
      <input type="text" data-field="name" value="${escapeHtml(current.name)}">
    </div>
    <div>
      <label>Description</label>
      <textarea data-field="desc">${escapeHtml(current.desc)}</textarea>
    </div>
    <div>
      <label>Specs (4 rows)</label>
  `);
  for (let i = 0; i < 4; i++) {
    const s = current.specs[i] || { k: '', v: '' };
    html.push(`
      <div class="spec-row">
        <input type="text" data-field="speck-${i}" placeholder="Label" value="${escapeHtml(s.k || '')}">
        <input type="text" data-field="specv-${i}" placeholder="Value" value="${escapeHtml(s.v || '')}">
      </div>
    `);
  }
  html.push(`
    </div>
    <div class="form-actions">
      <button type="button" class="save">Save changes</button>
      <button type="button" class="cancel">Cancel</button>
    </div>
  `);
  if (saved && Object.keys(saved).length > 0) {
    html.push(`
      <button type="button" class="reset" style="margin-top:6px;width:100%;padding:9px 10px;border-radius:4px;font-family:var(--font-mono);font-size:9.5px;letter-spacing:.16em;text-transform:uppercase;cursor:pointer;border:1px solid rgba(184,71,43,.3);background:transparent;color:#B8472B;">Reset details to original</button>
    `);
  }
  container.innerHTML = html.join('');

  container.querySelector('.save').addEventListener('click', () => {
    const data = {
      name: container.querySelector('[data-field="name"]').value.trim(),
      desc: container.querySelector('[data-field="desc"]').value.trim(),
      specs: [],
    };
    for (let i = 0; i < 4; i++) {
      data.specs.push({
        k: container.querySelector(`[data-field="speck-${i}"]`).value.trim(),
        v: container.querySelector(`[data-field="specv-${i}"]`).value.trim(),
      });
    }
    setProdEdit(p.code, data);
    toast('Saved · ' + p.code);
    renderGrid();
    updateMeta();
  });
  container.querySelector('.cancel').addEventListener('click', () => {
    container.classList.remove('open');
    container.innerHTML = '';
  });
  const resetBtn = container.querySelector('.reset');
  if (resetBtn) {
    resetBtn.addEventListener('click', () => {
      if (!confirm('Reset this product\\u2019s details to the original?')) return;
      clearProdEdit(p.code);
      renderGrid();
      updateMeta();
      toast('Reset details · ' + p.code);
    });
  }
}

function handleUpload(e, p) {
  const file = e.target.files && e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try {
      setOverride(p.file, reader.result);
      toast('Saved · ' + p.file);
      renderGrid();
      updateMeta();
    } catch (err) {
      alert('Could not save (likely browser storage full). ' + err.message);
    }
  };
  reader.readAsDataURL(file);
}

/* ---------------- bulk actions ---------------- */
document.getElementById('btn-clear').addEventListener('click', () => {
  if (!confirm('Clear ALL overrides (images + edited product details)? This cannot be undone.')) return;
  const keys = [];
  for (let i = 0; i < localStorage.length; i++) {
    const k = localStorage.key(i);
    if (k && (k.indexOf(STORAGE_PREFIX) === 0 || k.indexOf(PROD_PREFIX) === 0)) keys.push(k);
  }
  keys.forEach((k) => localStorage.removeItem(k));
  renderGrid(); updateMeta();
  toast('All overrides cleared');
});

document.getElementById('btn-export-all').addEventListener('click', () => {
  const images = [];
  const edits = {};
  for (const p of PRODUCTS) {
    const v = getOverride(p.file);
    if (v) images.push({ file: p.file, data: v });
    const e = getProdEdit(p.code);
    if (e) edits[p.code] = e;
  }
  if (images.length === 0 && Object.keys(edits).length === 0) {
    toast('No changes to download');
    return;
  }
  const downloads = images.slice();
  if (Object.keys(edits).length > 0) {
    const blob = new Blob([JSON.stringify(edits, null, 2)], { type: 'application/json' });
    downloads.push({ file: 'product-edits.json', data: URL.createObjectURL(blob) });
  }
  let i = 0;
  function next() {
    if (i >= downloads.length) {
      toast('Downloaded ' + downloads.length + ' file(s)');
      return;
    }
    const o = downloads[i++];
    const a = document.createElement('a');
    a.href = o.data;
    a.download = o.file;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(next, 350);
  }
  next();
});

/* ---------------- toast ---------------- */
let toastTimer;
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}
</script>
